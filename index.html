<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Only One ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap');

        :root {
            --pink-primary: #ff85a1;
            --pink-dark: #d81b60;
            --soft-white: #fff0f3;
        }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #fce4ec 0%, #fff1f0 100%);
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden; color: #4a4a4a;
        }

        /* Floating Hearts */
        .heart-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .floating-heart { position: absolute; color: var(--pink-primary); opacity: 0.6; animation: moveUp 6s linear infinite; }
        @keyframes moveUp { 0% { transform: translateY(100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }

        /* Header & Sorry Text Animation */
        header { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(255, 240, 243, 0.3), rgba(255, 240, 243, 0.3)), url('photo_2026-05-03_08-00-09.jpg') no-repeat center center/cover; z-index: 1; }
        header h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--pink-dark); animation: heartbeat 1.5s ease-in-out infinite; text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.8); }
        
        .sorry-animation { font-size: 2rem; color: #d81b60; font-weight: bold; animation: glowPulse 2s ease-in-out infinite; margin-top: 10px; }
        @keyframes glowPulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes heartbeat { 0%, 30%, 60% { transform: scale(1); } 15%, 45% { transform: scale(1.05); } }

        /* Timer */
        #time-counter { background: rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 30px; margin-top: 20px; border: 2px solid var(--pink-primary); z-index: 2; }
        #minutes-count { font-size: 2.2rem; font-weight: 700; color: var(--pink-dark); display: block; }

        /* Timeline Cards */
        .timeline { max-width: 800px; margin: 50px auto; padding: 20px; }
        .memory-card { background: white; margin-bottom: 50px; padding: 15px; border-radius: 25px; box-shadow: 0 15px 35px rgba(255, 133, 161, 0.15); opacity: 0; transform: translateY(50px); transition: all 1s ease; text-align: center; }
        .memory-card.active { opacity: 1; transform: translateY(0); }
        .memory-card img { width: 100%; border-radius: 20px; }

        /* Buttons */
        .btn-yes { background: var(--pink-primary); color: white; padding: 15px 50px; border-radius: 50px; border: none; font-size: 1.5rem; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 133, 161, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(255, 133, 161, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 133, 161, 0); } }
    </style>
</head>
<body>

    <div class="heart-bg" id="heartBg"></div>

    <!-- YouTube Music Section -->
    <div style="position: fixed; bottom: -100px; opacity: 0;">
        <div id="player"></div>
    </div>

    <header>
        <h1>I Like Me Better When I'm With You... ❤️</h1>
        <div class="sorry-animation">စိတ်မကောက်ပါနဲ့တော့နော်... 🥺❤️</div>
        
        <div id="time-counter">
            <p style="margin: 0; color: #666;">Together since April 30</p>
            <span id="minutes-count">0</span>
            <p style="margin: 0; color: #666;">minutes of happiness ❤️</p>
        </div>
    </header>

    <div class="timeline">
        <div class="memory-card"><img src="photo_1_2026-05-03_09-24-09.jpg"><h3>Every second matters.</h3></div>
        <div class="memory-card"><img src="photo_10_2026-05-03_09-24-09.jpg"><h3>My favorite person.</h3></div>
        <div class="memory-card"><img src="photo_15_2026-05-03_09-24-09.jpg"><h3>Forever to go...</h3></div>
    </div>

    <div style="text-align: center; padding: 100px 20px; background: white;">
        <h2 style="font-family: 'Dancing Script'; font-size: 2.5rem; color: var(--pink-dark);">Will you be mine forever?</h2>
        <button class="btn-yes" onclick="celebrate()">Yes, Forever!</button>
        <button id="noBtn" style="padding: 10px 30px; border-radius: 50px; border: none; margin-left: 10px; background: #eee;">No</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- YouTube API Setup ---
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0', videoId: '8req83Z24ic',
                playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': '8req83Z24ic', 'mute': 0 },
                events: { 'onReady': onPlayerReady }
            });
        }
        function onPlayerReady(event) {
            const startMusic = () => { event.target.playVideo(); };
            document.body.addEventListener('click', startMusic, { once: true });
            document.body.addEventListener('touchstart', startMusic, { once: true });
            document.body.addEventListener('scroll', startMusic, { once: true });
            window.addEventListener('scroll', startMusic, { once: true });
        }

        // --- Timer (Starts April 30, 9 AM) ---
        function updateTimer() {
            const startDate = new Date(2026, 3, 30, 9, 0, 0); 
            const now = new Date();
            const diffInMins = Math.floor((now - startDate) / 60000);
            document.getElementById('minutes-count').innerText = diffInMins.toLocaleString();
        }
        setInterval(updateTimer, 1000); updateTimer();

        // --- Floating Hearts ---
        const heartBg = document.getElementById('heartBg');
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart'); heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heartBg.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 350);

        // --- Scroll Reveal ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.memory-card').forEach(card => observer.observe(card));

        // --- Runaway No Button ---
        const noBtn = document.getElementById('noBtn');
        noBtn.addEventListener('mouseover', () => {
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.random() * (window.innerWidth - 150) + 'px';
            noBtn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        });

        // --- Telegram & Celebrate ---
        function celebrate() {
            const botToken = "8558652452:AAG3mjUygGp_uvNhuKHs_ANhHjrC8UTt808";
            const chatId = "7033586377";
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("💍 OMG! She said YES! ❤️")}`);

            document.body.innerHTML = `<div style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; background:var(--pink-primary); color:white; text-align:center;"><h1 style="font-size:3.5rem; font-family:'Dancing Script';">See you at forever! 💍❤️</h1><p style="font-size:1.5rem;">You made my life complete.</p><div style="font-size:100px;">💖</div></div>`;
            setInterval(createHeart, 50);
        }
    </script>
</body>
</html>
